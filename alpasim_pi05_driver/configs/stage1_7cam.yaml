# @package _global_
# 6-camera NuRec standard rig (matches all 918 NuRec scenes)

runtime:
  simulation_config:
    cameras:
      - logical_id: camera_cross_left_120fov
        height: 1080
        width: 1920
        frame_interval_us: 1_000_000
        shutter_duration_us: 30_000
        first_frame_offset_us: -30_000
      - logical_id: camera_front_wide_120fov
        height: 1080
        width: 1920
        frame_interval_us: 1_000_000
        shutter_duration_us: 30_000
        first_frame_offset_us: -30_000
      - logical_id: camera_cross_right_120fov
        height: 1080
        width: 1920
        frame_interval_us: 1_000_000
        shutter_duration_us: 30_000
        first_frame_offset_us: -30_000
      - logical_id: camera_rear_left_70fov
        height: 1080
        width: 1920
        frame_interval_us: 1_000_000
        shutter_duration_us: 30_000
        first_frame_offset_us: -30_000
      - logical_id: camera_rear_right_70fov
        height: 1080
        width: 1920
        frame_interval_us: 1_000_000
        shutter_duration_us: 30_000
        first_frame_offset_us: -30_000
      - logical_id: camera_front_tele_30fov
        height: 1080
        width: 1920
        frame_interval_us: 1_000_000
        shutter_duration_us: 30_000
        first_frame_offset_us: -30_000
